<nav
    class="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 sticky top-0 z-50 transition-colors duration-200">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <!-- Left: Logo -->
            <div class="flex items-center">
                <a href="#" class="flex items-center gap-2 cursor-default" onclick="return false;">
                    <span class="text-2xl">🎓</span>
                    <span
                        class="font-bold text-lg tracking-tight text-gray-900 dark:text-white hidden sm:block">Adaptive
                        LMS</span>
                </a>
            </div>

            <!-- Right: Profile Dropdown -->
            <div class="flex items-center gap-4">
                <button class="p-2 text-gray-400 hover:text-gray-600 transition relative">
                    🔔
                    <span class="absolute top-2 right-2 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                </button>

                <div class="relative">
                    {% if user.is_authenticated %}
                    <button onclick="toggleProfileDropdown()" id="profileDropdownButton"
                        class="flex items-center gap-2 p-1 rounded-full hover:bg-gray-100 transition focus:outline-none">
                        <div
                            class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs ring-2 ring-white shadow-sm">
                            {{ request.user.username|slice:":1"|upper }}
                        </div>
                        <span class="text-sm font-semibold text-gray-700 hidden sm:block">
                            {{request.user.get_full_name|default:request.user.username }}</span>
                        <span class="text-xs text-gray-400">▼</span>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="profileDropdownMenu"
                        class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 py-2 z-50 transform origin-top-right transition-all">
                        <a href="javascript:void(0)" onclick="handleNavbarLink('settings', 'profile', this)"
                            class="flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 transition">
                            <span class="mr-3">👤</span> My Profile
                        </a>
                        <a href="javascript:void(0)" onclick="handleNavbarLink('settings', 'account', this)"
                            class="flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 transition">
                            <span class="mr-3">⚙️</span> Settings
                        </a>
                        <hr class="my-1 border-gray-100 dark:border-gray-700">
                        <form action="{% url 'logout' %}" method="post" class="block">
                            {% csrf_token %}
                            <button type="submit"
                                class="w-full flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                                <span class="mr-3">➜]</span> Logout
                            </button>
                        </form>
                    </div>
                    {% else %}
                    <a href="{% url 'login' %}"
                        class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-md">
                        Login
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</nav>

<script>
    function toggleProfileDropdown() {
        const menu = document.getElementById('profileDropdownMenu');
        menu.classList.toggle('hidden');
    }

    function handleNavbarLink(section, tab, element) {
        if (typeof showSection === 'function') {
            showSection(section, element);
            if (section === 'settings' && typeof showSettingsTab === 'function') {
                const tabButton = document.querySelector(`[onclick*="showSettingsTab('${tab}'"]`);
                showSettingsTab(tab, tabButton || element);
            }
        } else {
            window.location.href = `{% url 'dashboard' %}?section=${section}&tab=${tab}`;
        }
        toggleProfileDropdown();
    }

    // Close dropdown when clicking outside
    window.addEventListener('click', function (e) {
        const button = document.getElementById('profileDropdownButton');
        const menu = document.getElementById('profileDropdownMenu');
        if (button && menu && !button.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.add('hidden');
        }
    });
</script>
